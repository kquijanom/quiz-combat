    .ranking-position { font-weight: 700; font-size: 20px; color: var(--orange-500); min-width: 40px; }
    .ranking-info { flex: 1; }
    .ranking-name { font-weight: 600; font-size: 14px; color: var(--navy-900); margin-bottom: 2px; }

  <script>

const SUPABASE_URL = 'https://qukuudhptrqwnuzhxxfb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1a3V1ZGhwdHJxd251emh4eGZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjYyODksImV4cCI6MjA5OTU0MjI4OX0.dEobt8qkR8SrTBoQdIxrYofb7Bd8MXv9g24JTHV1XU4';

function getSupabase() {
  if (!sb && window.supabase && window.supabase.createClient) {

    } catch (e) {

// Intentar inicializar Supabase múltiples veces
let initAttempts = 0;
const initInterval = setInterval(() => {
  if (getSupabase()) {
    console.log('✓ Supabase inicializado correctamente');

    if (initAttempts > 30) {
      console.error('✗ No se pudo inicializar Supabase');
      clearInterval(initInterval);

}, 200);

const questionsData = [
  {id:'act1',topic:'Actualidad',text:'¿Qué tecnología ha tenido un crecimiento acelerado desde 2023?',options:['Fax','Inteligencia Artificial Generativa','Disquetes','Pagers'],correctAnswerIndex:1,justification:'La IA generativa ha experimentado una rápida adopción.'},
  {id:'act2',topic:'Actualidad',text:'¿Qué fenómeno está relacionado con el aumento de la temperatura promedio del planeta?',options:['Cambio climático','Lluvia ácida','Erosión','Tornados'],correctAnswerIndex:0,justification:'El cambio climático implica un calentamiento global sostenido.'},
  {id:'sci1',topic:'Ciencia y tecnología',text:'¿Cuál es el planeta más cercano al Sol?',options:['Venus','Marte','Mercurio','Tierra'],correctAnswerIndex:2,justification:'Mercurio es el primer planeta del Sistema Solar.'},
  {id:'cin1',topic:'Cine y series',text:'¿Qué premio es el más prestigioso del cine?',options:['Grammy','Óscar','Emmy','Tony'],correctAnswerIndex:1,justification:'Los Premios Óscar reconocen la excelencia cinematográfica.'},
  {id:'cul1',topic:'Cultura general',text:'¿Quién escribió Don Quijote de la Mancha?',options:['Gabriel García Márquez','Miguel de Cervantes','Pablo Neruda','Federico García Lorca'],correctAnswerIndex:1,justification:'Cervantes publicó la obra en el siglo XVII.'},
  {id:'geo1',topic:'Geografía',text:'¿Cuál es la capital de Argentina?',options:['Rosario','Córdoba','Buenos Aires','Mendoza'],correctAnswerIndex:2,justification:'Buenos Aires es la capital argentina.'},
  {id:'his1',topic:'Historia',text:'¿Qué civilización construyó las pirámides de Guiza?',options:['Romanos','Egipcios','Mayas','Griegos'],correctAnswerIndex:1,justification:'Las pirámides de Guiza fueron construidas por el Antiguo Egipto.'},
  {id:'dep1',topic:'Deportes',text:'¿Cuántos jugadores tiene un equipo de fútbol en el campo al iniciar el partido?',options:['9','10','11','12'],correctAnswerIndex:2,justification:'Cada equipo juega con 11 futbolistas.'}
];

const topicsList = ['Actualidad','Ciencia y tecnología','Cine y series','Colombia','Cultura general','Deportes','Economía y negocios','Gastronomía','Geografía','Historia','Internet y redes sociales','Música','Naturaleza','Salud','Videojuegos'];

// Cargar CSV y parsear preguntas
async function loadQuestionsFromCSV() {
  try {
    const response = await fetch('./preguntas.csv');
    const csvText = await response.text();
    const lines = csvText.split('\n').slice(1);
    const parsed = [];
    lines.forEach((line, idx) => {
      if (!line.trim()) return;
      const parts = line.split(';');
      if (parts.length < 8) return;
      const correctIdx = parts[6].trim().charCodeAt(0) - 65;
      if (correctIdx < 0 || correctIdx > 3) return;
      parsed.push({
        id: `q${idx}`,
        topic: parts[0].trim(),
        text: parts[1].trim(),
        options: [parts[2].trim(), parts[3].trim(), parts[4].trim(), parts[5].trim()],
        correctAnswerIndex: correctIdx,
        justification: parts[7].trim()
      });
    });
    questionsData.splice(0, questionsData.length, ...parsed);
    console.log(`✓ Cargadas ${parsed.length} preguntas desde CSV`);
  } catch (e) {
    console.log('CSV no disponible, usando preguntas por defecto');
  }
}
loadQuestionsFromCSV();

function getQuestionsByTopic(t) { return questionsData.filter(q => q.topic === t).slice(0, 5); }
function createSampleUser(n) { return {id:`user-${Date.now()}-${Math.random()}`,name:n,winRate:Math.floor(Math.random()*100),emoji:['👨','👩','👦','👧'][Math.floor(Math.random()*4)]}; }

const state = {
  screen: 'login',
  loginTab: 'session',
  currentUser: null,
  currentGroup: null,
  inviteCode: null,
  selectedTopic: null,
  selectedRival: null,
  currentQuestionIndex: 0,
  answers: Array(5).fill(null),
  userScore: 0,
  rivalScore: 0,
  resultUserWon: false,
  isLoggedIn: false,
  currentQuestions: [],
  isRankingMode: false,
  matchmakingStatus: 'idle',
  loading: false,
  message: { type: null, text: null },
  globalRanking: [
    {name:'Carlos',points:1000,winRate:85},{name:'María',points:900,winRate:80},{name:'Juan',points:800,winRate:75},{name:'Sofia',points:700,winRate:70},
    {name:'Diego',points:600,winRate:65},{name:'Roberto',points:550,winRate:72},{name:'Ana',points:500,winRate:68},{name:'Luis',points:450,winRate:60}
  ]
};

function setState(u) { Object.assign(state, u); render(); }
function switchTab(t) { setState({loginTab: t, message: {type:null,text:null}}); }
function showMessage(type, text) { setState({message: {type, text}}); setTimeout(() => setState({message: {type:null,text:null}}), 4000); }

async function handleSessionLogin() {
  const u = document.getElementById('sessionUsername')?.value;
  const p = document.getElementById('sessionPassword')?.value;
  if (!u || !p) return showMessage('error', 'Por favor completa todos los campos');

  setState({loading: true});
  const client = getSupabase();
  if (!client) return (setState({loading: false}), showMessage('error', 'Supabase aún está cargando...'));

  try {
    const {data, error} = await client.auth.signInWithPassword({email: u + '@example.com', password: p});
    if (error) {
      setState({loading: false});
      return showMessage('error', error.message || 'Error al iniciar sesión');
    }

    const {data: userProfile} = await client.from('profiles').select('*').eq('id', data.user.id).single();
    const winRate = userProfile?.total_duels > 0 ? Math.round((userProfile.total_wins / userProfile.total_duels) * 100) : 0;

    setState({
      screen: 'dashboard',
      currentUser: {
        name: userProfile?.username || u,
        id: data.user.id,
        winRate: winRate,
        totalDuels: userProfile?.total_duels || 0,
        totalWins: userProfile?.total_wins || 0,
        points: userProfile?.points || 0,
        emoji:'👤'
      },
      isLoggedIn: true,
      currentGroup: {
        name: 'Mi grupo',
        code: 'GRUPO001',
        members: [
          {name: userProfile?.username || u, id: data.user.id, winRate, emoji:'👤'},
          createSampleUser('María'),
          createSampleUser('Juan'),
          createSampleUser('Sofia')
        ]
      },
      loginTab: 'session',
      loading: false,
      message: {type:null,text:null}
    });
    localStorage.setItem('quizCombatUser', u);
  } catch (err) {
    setState({loading: false});
    showMessage('error', 'Error al iniciar sesión: ' + err.message);
  }
}

async function handleSessionRegister() {
  const u = document.getElementById('registerUsername')?.value;
  const p = document.getElementById('registerPassword')?.value;
  if (!u || !p) return showMessage('error', 'Por favor completa todos los campos');
  if (p.length < 6) return showMessage('error', 'La contraseña debe tener al menos 6 caracteres');

  setState({loading: true});
  const client = getSupabase();
  if (!client) return (setState({loading: false}), showMessage('error', 'Supabase aún está cargando...'));

  try {
    const uniqueEmail = u + '+' + Date.now() + '@example.com';
    const {data, error} = await client.auth.signUp({email: uniqueEmail, password: p});
    if (error) {
      setState({loading: false});
      return showMessage('error', error.message || 'Error al crear cuenta');
    }

    const {error: insertError} = await client.from('profiles').insert([{id: data.user?.id, username: u}]);
    if (insertError) throw insertError;

    setState({loading: false});
    showMessage('success', '¡Cuenta creada! Inicia sesión ahora.');
    setState({loginTab: 'session'});
  } catch (err) {
    setState({loading: false});
    showMessage('error', 'Error al crear cuenta: ' + err.message);
  }
}

function handleCreateGroup() {
  const n = document.getElementById('groupName')?.value;
  const u = document.getElementById('userName')?.value;
  if (!n || !u) return showMessage('error', 'Por favor completa todos los campos');
  const c = Math.random().toString(36).substring(2,8).toUpperCase();
  let newUser = {name:u,id:`user-${Date.now()}`,winRate:0,emoji:'👤',totalDuels:0,totalWins:0,points:0};
  setState({screen:'invite-code',inviteCode:c,currentGroup:{name:n,code:c,members:[newUser]},currentUser:newUser,isLoggedIn:false});

  // Cargar stats desde Supabase en background
  loadUserStats(c, u).then(savedStats => {
    if (savedStats) {
      console.log('✅ Stats cargadas de Supabase:', savedStats);
      setState({currentUser: {...newUser, ...savedStats}});
    }
  });
}

function handleJoinGroup() {
  const c = document.getElementById('joinCode')?.value;
  const n = document.getElementById('joinName')?.value;
  if (!c || !n) return showMessage('error', 'Por favor completa todos los campos');
  let newUser = {name:n,id:`user-${Date.now()}`,winRate:0,emoji:'👤',totalDuels:0,totalWins:0,points:0};
  setState({screen:'dashboard',currentUser:newUser,currentGroup:{name:`Grupo ${c}`,code:c,members:[newUser,createSampleUser('María'),createSampleUser('Juan'),createSampleUser('Sofia')]},isLoggedIn:false});

  // Cargar stats desde Supabase en background
  loadUserStats(c, n).then(savedStats => {
    if (savedStats) {
      console.log('✅ Stats cargadas de Supabase:', savedStats);
      setState({currentUser: {...newUser, ...savedStats}});
    }
  });
}

function handleCopyCode() { state.inviteCode && (navigator.clipboard.writeText(state.inviteCode), alert('Código copiado al portapapeles')); }

function handleJoinRanking() {
  const n = document.getElementById('rankingPlayerName')?.value;
  n ? setState({screen:'ranking',currentUser:{name:n,id:`ranking-${Date.now()}`,winRate:50,emoji:'👤'},isLoggedIn:false,isRankingMode:true}) : showMessage('error', 'Por favor ingresa tu nombre');
}

function startAutoMatchmaking() {
  setState({matchmakingStatus:'matching'});
  setTimeout(() => {
    const a = state.globalRanking.filter(p => p.name !== state.currentUser?.name);
    const r = a[Math.floor(Math.random() * a.length)];
    const t = topicsList[Math.floor(Math.random() * topicsList.length)];
    setState({screen:'game', selectedRival:r, selectedTopic:t, currentQuestionIndex:0, answers:Array(5).fill(null), matchmakingStatus:'matched', isRankingMode:true, currentQuestions: getQuestionsByTopic(t)});
  }, 2000);
}

function cancelMatchmaking() { setState({screen:'ranking', matchmakingStatus:'idle'}); }
function handleShowRankingJoin() { setState({screen:'ranking-join'}); }

async function logout() {
  const client = getSupabase();
  if (client) {
    await client.auth.signOut();
  }
  setState({screen:'login', currentUser:null, currentGroup:null, inviteCode:null, isLoggedIn:false, loginTab:'session'});
  localStorage.removeItem('quizCombatUser');
}

async function saveUserStats(groupCode, userName, userObj) {
  const client = getSupabase();
  if (!client) return;

  try {
    const { error } = await client.from('group_stats').upsert({
      group_code: groupCode,
      user_name: userName,
      total_duels: userObj.totalDuels || 0,
      total_wins: userObj.totalWins || 0,
      points: userObj.points || 0,
      win_rate: userObj.winRate || 0,
      updated_at: new Date().toISOString()
    }, {onConflict: 'group_code,user_name'});

    if (error) {
      console.log('❌ Error guardando stats en Supabase:', error);
    } else {
      console.log('✅ Stats guardadas en Supabase:', {groupCode, userName, ...userObj});
    }
  } catch(e) {
    console.log('❌ Error en saveUserStats:', e);
  }
}

async function loadUserStats(groupCode, userName) {
  const client = getSupabase();
  if (!client) return null;

  try {
    const { data, error } = await client
      .from('group_stats')
      .select('*')
      .eq('group_code', groupCode)
      .eq('user_name', userName)
      .single();

    if (error && error.code !== 'PGRST116') {
      console.log('❌ Error cargando stats:', error);
      return null;
    }

    if (data) {
      console.log('✅ Stats cargadas de Supabase:', data);
      return {
        totalDuels: data.total_duels,
        totalWins: data.total_wins,
        points: data.points,
        winRate: data.win_rate
      };
    }

    console.log('❌ No hay stats guardadas para:', userName);
    return null;
  } catch(e) {
    console.log('❌ Error en loadUserStats:', e);
    return null;
  }
}

function isDuelPlayed(topic, rivalName) {
  const duelKey = `duel-${topic}-${rivalName}`;
  const lastDuel = localStorage.getItem(duelKey);
  if (!lastDuel) return false;
  const oneDayMs = 24 * 60 * 60 * 1000;
  return (Date.now() - parseInt(lastDuel)) < oneDayMs;
}

function selectTopic(t) { state.selectedTopic === t ? setState({selectedTopic:null,selectedRival:null}) : setState({selectedTopic:t, selectedRival:null, currentQuestions: getQuestionsByTopic(t)}); }

function selectRival(n) {
  if (state.selectedTopic && isDuelPlayed(state.selectedTopic, n)) {
    return showMessage('error', `Ya jugaste contra ${n} en ${state.selectedTopic}. Vuelve mañana.`);
  }
  const r = state.currentGroup?.members.find(m => m.name === n);
  r && (state.selectedRival?.name === r.name ? setState({selectedRival:null, currentQuestions:state.currentQuestions}) : setState({selectedRival:r, currentQuestions:state.currentQuestions}));
}

function startDuel() {
  if (!state.selectedTopic || !state.selectedRival) return showMessage('error', 'Por favor selecciona un tema y un rival');
  if (!questionsData || questionsData.length === 0) return showMessage('error', 'Las preguntas aún se están cargando...');
  const q = getQuestionsByTopic(state.selectedTopic);
  if (q.length === 0) return showMessage('error', 'No hay preguntas disponibles para este tema');

  const duelKey = `duel-${state.selectedTopic}-${state.selectedRival.name}`;
  const lastDuel = localStorage.getItem(duelKey);
  const now = Date.now();
  const oneDayMs = 24 * 60 * 60 * 1000;

  if (lastDuel && (now - parseInt(lastDuel)) < oneDayMs) {
    const hoursLeft = Math.ceil((oneDayMs - (now - parseInt(lastDuel))) / (60 * 60 * 1000));
    return showMessage('error', `Ya jugaste contra ${state.selectedRival.name} en ${state.selectedTopic}. Vuelve en ${hoursLeft}h.`);
  }

  localStorage.setItem(duelKey, now.toString());
  setState({screen:'game', currentQuestionIndex:0, answers:Array(q.length).fill(null), currentQuestions:q, isRankingMode:false});
}

function selectAnswer(i, a) { const ans = [...state.answers]; ans[i] = a; setState({answers:ans}); }
function nextQuestion() { state.currentQuestionIndex < state.currentQuestions.length - 1 && setState({currentQuestionIndex:state.currentQuestionIndex+1, currentQuestions:state.currentQuestions, selectedTopic:state.selectedTopic, selectedRival:state.selectedRival, answers:state.answers}); }
function prevQuestion() { state.currentQuestionIndex > 0 && setState({currentQuestionIndex:state.currentQuestionIndex-1, currentQuestions:state.currentQuestions, selectedTopic:state.selectedTopic, selectedRival:state.selectedRival, answers:state.answers}); }

async function submitDuel() {
  let s = 0;
  for (let i = 0; i < state.currentQuestions.length; i++) { if (state.answers[i] === state.currentQuestions[i].correctAnswerIndex) s++; }
  const rs = Math.floor(Math.random() * 5);
  const userWon = s > rs;

  // Calcular nuevas estadísticas
  const newTotalDuels = (state.currentUser?.totalDuels || 0) + 1;
  const newTotalWins = (state.currentUser?.totalWins || 0) + (userWon ? 1 : 0);
  const newPoints = (state.currentUser?.points || 0) + s;
  const newWinRate = newTotalDuels > 0 ? Math.round((newTotalWins / newTotalDuels) * 100) : 0;

  const updatedUser = {
    name: state.currentUser?.name,
    id: state.currentUser?.id,
    emoji: state.currentUser?.emoji,
    totalDuels: newTotalDuels,
    totalWins: newTotalWins,
    points: newPoints,
    winRate: newWinRate
  };

  // Guardar en Supabase (grupo stats)
  if (state.currentGroup?.code && state.currentUser?.name) {
    const client = getSupabase();
    if (client) {
      client.from('group_stats').upsert({
        group_code: state.currentGroup.code,
        user_name: state.currentUser.name,
        total_duels: newTotalDuels,
        total_wins: newTotalWins,
        points: newPoints,
        win_rate: newWinRate,
        updated_at: new Date().toISOString()
      }, {onConflict: 'group_code,user_name'}).then(() => {
        console.log('✅ Stats guardadas en Supabase:', state.currentGroup.code, state.currentUser.name);
      }).catch(e => console.log('❌ Error guardando en Supabase:', e));
    }
  }

  // Actualizar en Supabase si está loggeado (tabla profiles)
  if (state.isLoggedIn && state.currentUser?.id) {
    const client = getSupabase();
    if (client) {
      await client.from('profiles').update({
        total_duels: newTotalDuels,
        total_wins: newTotalWins,
        points: newPoints,
        win_rate: newWinRate
      }).eq('id', state.currentUser.id);
    }
  }

  // Actualizar estado local SIEMPRE
  setState({
    screen:'results',
    userScore:s,
    rivalScore:rs,
    resultUserWon:userWon,
    isRankingMode:state.isRankingMode,
    currentUser: updatedUser,
    currentGroup: state.currentGroup
  });
}

function backToRanking() { setState({screen:'ranking', selectedTopic:null, selectedRival:null, currentQuestionIndex:0, answers:Array(5).fill(null), matchmakingStatus:'idle'}); }
function backToDashboard() {
  setState({
    screen:'dashboard',
    selectedTopic:null,
    selectedRival:null,
    currentQuestionIndex:0,
    answers:Array(5).fill(null),
    currentUser: state.currentUser
  });
}
function goToDashboard() { setState({screen:'dashboard', currentUser: state.currentUser}); }
function backToLogin() { setState({screen:'login', currentUser:null, currentGroup:null, inviteCode:null, loginTab:'session'}); }
